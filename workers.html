    </section><section class="section form-section" id="request"><div class="form-intro"><h2>Анкета работника</h2><p>Заполни данные, чтобы попасть в первую базу GastroConnect и получать предложения по сменам.</p></div>
<form class="form-card" data-form-type="worker"><div class="form-grid">
<label>Имя и фамилия<input name="name" required placeholder="Иван Иванов"></label><label>Телефон<input name="phone" required placeholder="+7..."></label><label>Telegram<input name="telegram" placeholder="@username"></label><label>Город<input name="city" placeholder="Москва"></label><label>Район / метро<input name="district" placeholder="Центр / м. ..."></label><label>Профессия<select name="role" required><option value="">Выберите вариант</option><option>Официант</option><option>Бармен</option><option>Повар</option><option>Повар горячего цеха</option><option>Повар холодного цеха</option><option>Су-шеф</option><option>Шеф-повар</option><option>Бариста</option><option>Хостес</option><option>Администратор</option><option>Кальянщик</option><option>Посудомойщик</option><option>Курьер</option><option>Раннер</option><option>Уборщик</option><option>Метрдотель</option><option>Сомелье</option><option>Кондитер</option><option>Пекарь</option><option>Заготовщик</option><option>Разнорабочий</option><option>Несколько сотрудников</option><option>Другое</option></select></label><label>Опыт работы<select name="experience"><option>Без опыта</option><option>До 1 года</option><option>1–3 года</option><option>3–5 лет</option><option>Более 5 лет</option></select></label><label>Желаемая ставка<input name="expected_rate" placeholder="Например: от 350 ₽/час"></label><label class="full">Когда готовы выходить<textarea name="availability" placeholder="Будни, выходные, вечер, срочно..."></textarea></label><label class="full">Комментарий<textarea name="comment" placeholder="Опыт, форма, медкнижка, предпочтения..."></textarea></label></div><button class="btn primary" type="submit">Отправить анкету</button><div class="success"></div></form></section></main><footer class="footer" id="contacts">
