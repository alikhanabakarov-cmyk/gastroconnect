<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход и регистрация — GastroConnect</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preload" href="assets/logo-full.png" as="image" type="image/png" fetchpriority="high" />
    <link rel="preload" href="assets/hero-home.webp" as="image" type="image/webp" fetchpriority="high" />
    <style>
      :root{--cream:#fffaf2;--cream-2:#f6ecdf;--green:#064c3b;--gold:#c99a3f;--ink:#101312;--text:#2d3431;--line:rgba(201,154,63,.28);--shadow:0 24px 70px rgba(42,33,18,.12)}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:linear-gradient(180deg,var(--cream) 0%,var(--cream-2) 100%);overflow-x:hidden}img{max-width:100%}.site-header{position:sticky;top:0;z-index:50;min-height:88px;padding:14px 56px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:34px;background:rgba(255,250,242,.95);border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;width:250px;max-width:32vw;text-decoration:none}.brand-logo{width:100%;max-width:240px;height:auto;aspect-ratio:4/1;display:block;object-fit:contain}.main-nav{display:flex;justify-content:center;align-items:center;gap:28px}.main-nav a{text-decoration:none;color:var(--ink);font-size:17px;font-weight:900}.header-cta,.btn,button{min-height:54px;padding:0 24px;border:1px solid var(--gold);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,250,242,.9);color:#b37a1f;text-decoration:none;font:inherit;font-size:17px;font-weight:900}.header-cta,button{border-color:var(--green);background:var(--green);color:#fff}.auth-page,.cabinet-page{max-width:1380px;margin:44px auto;padding:0 48px 60px}.service-hero{width:100%;display:grid;grid-template-columns:minmax(300px,.9fr) minmax(420px,1.1fr);align-items:center;gap:34px;margin-bottom:34px}.service-hero-copy{min-width:0}.eyebrow{margin:0 0 18px;color:var(--gold);font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.06em}.service-hero-copy h1{margin:0 0 16px;color:var(--green);font-size:clamp(36px,4.6vw,64px);line-height:1.04;font-weight:950;overflow-wrap:break-word}.service-hero-copy p:not(.eyebrow):not(.message){max-width:620px;margin:0 0 18px;color:var(--text);font-size:20px;line-height:1.45}.service-hero-media{position:relative;min-height:360px;overflow:hidden;border-radius:24px;border:1px solid rgba(201,154,63,.24);background:#eadfce;box-shadow:var(--shadow)}.service-hero-image{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover;object-position:center}.auth-card{max-width:560px;margin:0 auto;padding:34px}@media(max-width:1050px){.site-header{padding:16px 22px;grid-template-columns:1fr;gap:16px}.main-nav{justify-content:flex-start;flex-wrap:wrap;gap:14px}.auth-page,.cabinet-page{padding-left:22px;padding-right:22px}.service-hero{grid-template-columns:1fr;gap:24px}.service-hero-media{min-height:340px}}@media(max-width:620px){.site-header{display:flex;flex-direction:column;align-items:stretch;padding:14px 20px}.brand{width:220px;max-width:100%}.main-nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 14px}.service-hero-copy h1{font-size:30px;line-height:1.08;overflow-wrap:anywhere}.service-hero-copy p:not(.eyebrow):not(.message){font-size:17px;overflow-wrap:anywhere}.service-hero-media{min-height:250px;border-radius:18px}.btn,.header-cta,button{width:100%;min-width:0}}
    </style>
    <link
      rel="preload"
      href="style.css?v=1011"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript><link rel="stylesheet" href="style.css?v=1011" /></noscript>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="GastroConnect">
          <img
            class="brand-logo"
            data-site-logo
            src="assets/logo-full.png"
            width="240"
            height="60"
            alt=""
            decoding="async"
            fetchpriority="high"
          />
        </a>
        <nav class="main-nav" aria-label="Главное меню">
          <a href="workers.html" data-site-setting="nav.workers">Сотрудникам</a>
          <a href="restaurants.html" data-site-setting="nav.restaurants">Заведениям</a>
          <a href="suppliers.html" data-site-setting="nav.suppliers">Поставщикам</a>
          <a href="index.html#contacts" data-site-setting="nav.contacts">Контакты</a>
        </nav>
        <a class="header-cta" href="index.html" data-site-setting="nav.home"
          >На главную</a
        >
      </header>

      <main class="auth-page service-page">
        <section class="service-hero service-hero-auth">
          <div class="service-hero-copy">
            <p class="eyebrow" data-site-setting="auth.eyebrow">
              Единый вход GastroConnect
            </p>
            <h1 id="authTitle" data-site-setting="auth.title">
              Вход и регистрация
            </h1>
            <p id="authLead" data-site-setting="auth.lead">
              Выберите роль и создайте аккаунт. После входа вы попадете в
              кабинет.
            </p>
          </div>
          <div class="service-hero-media" aria-hidden="true">
            <img
              class="service-hero-image"
              data-site-image="auth.hero"
              src="assets/hero-home.webp"
              width="1080"
              height="675"
              alt=""
              decoding="async"
              fetchpriority="high"
            />
          </div>
        </section>

        <section class="auth-card">
          <h2>Данные аккаунта</h2>

          <label
            >Email<input
              id="email"
              type="email"
              placeholder="example@mail.ru"
              autocomplete="email"
          /></label>
          <label
            >Пароль<input
              id="password"
              type="password"
              placeholder="Минимум 6 символов"
              autocomplete="current-password"
          /></label>
          <label
            >Роль
            <select id="role">
              <option value="worker">Работник</option>
              <option value="restaurant">Заведение</option>
              <option value="supplier">Поставщик</option>
            </select>
          </label>

          <div class="cabinet-actions form-actions">
            <button id="registerBtn" type="button">Зарегистрироваться</button>
            <button id="loginBtn" class="btn" type="button">Войти</button>
          </div>

          <p id="authMessage" class="message auth-message"></p>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=1002"></script>
    <script src="script.js?v=1019"></script>
  </body>
</html>
