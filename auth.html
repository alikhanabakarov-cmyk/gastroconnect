<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход и регистрация — GastroConnect</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="style-v1004.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="GastroConnect">
          <img
            class="brand-logo"
            data-site-logo
            src="assets/logo-full.png"
            width="240"
            height="60"
            alt=""
            decoding="async"
          />
        </a>
        <nav class="main-nav" aria-label="Главное меню">
          <a href="workers.html">Сотрудникам</a>
          <a href="restaurants.html">Заведениям</a>
          <a href="suppliers.html">Поставщикам</a>
          <a href="index.html#contacts">Контакты</a>
        </nav>
        <a class="header-cta" href="index.html">На главную</a>
      </header>

      <main class="auth-page">
        <section class="auth-card">
          <h1 id="authTitle">Вход и регистрация</h1>
          <p id="authLead">
            Выберите роль и создайте аккаунт. После входа вы попадете в кабинет.
          </p>

          <label
            >Email<input
              id="email"
              type="email"
              placeholder="example@mail.ru"
              autocomplete="email"
          /></label>
          <label
            >Пароль<input
              id="password"
              type="password"
              placeholder="Минимум 6 символов"
              autocomplete="current-password"
          /></label>
          <label
            >Роль
            <select id="role">
              <option value="worker">Работник</option>
              <option value="restaurant">Заведение</option>
              <option value="supplier">Поставщик</option>
            </select>
          </label>

          <div class="cabinet-actions form-actions">
            <button id="registerBtn" type="button">Зарегистрироваться</button>
            <button id="loginBtn" class="btn" type="button">Войти</button>
          </div>

          <p id="authMessage" class="message auth-message"></p>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="script-v1004.js"></script>
  </body>
</html>
