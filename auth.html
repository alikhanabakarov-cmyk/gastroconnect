<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход и регистрация — GastroConnect</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta
      name="description"
      content="Вход и регистрация в GastroConnect для работников, заведений и поставщиков HoReCa."
    />
    <meta name="theme-color" content="#064c3b" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="preload"
      href="assets/hero-home.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
    />
    <link rel="stylesheet" href="style.css?v=1014" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="GastroConnect">
          <img
            class="brand-logo"
            data-site-logo
            src="assets/logo-full.png"
            width="240"
            height="60"
            alt=""
            decoding="async"
          />
        </a>
        <nav class="main-nav" aria-label="Главное меню">
          <a href="workers.html" data-site-setting="nav.workers">Сотрудникам</a>
          <a href="restaurants.html" data-site-setting="nav.restaurants"
            >Заведениям</a
          >
          <a href="suppliers.html" data-site-setting="nav.suppliers"
            >Поставщикам</a
          >
          <a href="index.html#contacts" data-site-setting="nav.contacts"
            >Контакты</a
          >
        </nav>
        <a class="header-cta" href="index.html" data-site-setting="nav.home"
          >На главную</a
        >
      </header>

      <main class="auth-page service-page">
        <section class="service-hero service-hero-auth">
          <div class="service-hero-copy">
            <p class="eyebrow" data-site-setting="auth.eyebrow">
              Единый вход GastroConnect
            </p>
            <h1 id="authTitle" data-site-setting="auth.title">
              Вход и регистрация
            </h1>
            <p id="authLead" data-site-setting="auth.lead">
              Выберите роль и создайте аккаунт. После входа вы попадете в
              кабинет.
            </p>
          </div>
          <div class="service-hero-media" aria-hidden="true">
            <img
              class="service-hero-image"
              data-site-image="auth.hero"
              src="assets/hero-home.webp"
              width="1080"
              height="675"
              alt=""
              loading="eager"
              decoding="async"
              fetchpriority="high"
            />
          </div>
        </section>

        <section class="auth-card">
          <div
            class="auth-mode-tabs"
            role="tablist"
            aria-label="Вход или регистрация"
          >
            <button id="showLoginBtn" class="btn" type="button">Вход</button>
            <button id="showRegisterBtn" type="button">Регистрация</button>
          </div>

          <h2 id="authFormTitle">Регистрация</h2>
          <p id="authModeHint" class="message auth-mode-hint"></p>

          <label
            >Email<input
              id="email"
              type="email"
              placeholder="example@mail.ru"
              autocomplete="email"
          /></label>
          <label
            >Пароль<input
              id="password"
              type="password"
              placeholder="Минимум 6 символов"
              autocomplete="new-password"
          /></label>
          <label id="roleField"
            >Роль
            <select id="role">
              <option value="worker">Работник</option>
              <option value="restaurant">Заведение</option>
              <option value="supplier">Поставщик</option>
            </select>
          </label>

          <div class="cabinet-actions form-actions">
            <button id="registerBtn" type="button">Создать аккаунт</button>
            <button id="loginBtn" class="btn" type="button">Войти</button>
            <a id="cabinetShortcut" class="btn" href="cabinet.html" hidden
              >Открыть кабинет</a
            >
          </div>

          <p id="authMessage" class="message auth-message"></p>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js?v=1002"></script>
    <script src="public.min.js?v=1002"></script>
  </body>
</html>
