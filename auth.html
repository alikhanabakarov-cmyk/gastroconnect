<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход и регистрация — GastroConnect</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="page-shell">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="GastroConnect">
      <span class="brand-mark" aria-hidden="true">GC</span>
      <span class="brand-text">GastroConnect</span>
    </a>
    <nav class="main-nav" aria-label="Главное меню">
      <a href="workers.html">Сотрудникам</a>
      <a href="restaurants.html">Заведениям</a>
      <a href="suppliers.html">Поставщикам</a>
      <a href="index.html#contacts">Контакты</a>
    </nav>
    <a class="header-cta" href="index.html">На главную</a>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <h1 id="authTitle">Вход и регистрация</h1>
      <p id="authLead">Выберите роль и создайте аккаунт. После входа вы попадете в кабинет.</p>

      <label>Email<input id="email" type="email" placeholder="example@mail.ru" autocomplete="email" /></label>
      <label>Пароль<input id="password" type="password" placeholder="Минимум 6 символов" autocomplete="current-password" /></label>
      <label>Роль
        <select id="role">
          <option value="worker">Работник</option>
          <option value="restaurant">Заведение</option>
          <option value="supplier">Поставщик</option>
        </select>
      </label>

      <div class="cabinet-actions" style="margin-top:20px;">
        <button id="registerBtn" type="button">Зарегистрироваться</button>
        <button id="loginBtn" class="btn" type="button">Войти</button>
      </div>

      <p id="authMessage" class="message" style="margin-top:20px;"></p>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js?v=1003"></script>
<script>
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const roleInput = document.getElementById('role');
  const message = document.getElementById('authMessage');
  const registerBtn = document.getElementById('registerBtn');
  const loginBtn = document.getElementById('loginBtn');
  const authTitle = document.getElementById('authTitle');
  const authLead = document.getElementById('authLead');

  const roleCopy = {
    worker: {
      title: 'Регистрация работника',
      lead: 'Создайте аккаунт работника, заполните профиль и откликайтесь на смены в кабинете.'
    },
    restaurant: {
      title: 'Регистрация заведения',
      lead: 'Создайте аккаунт заведения, публикуйте смены, смотрите работников и заявки поставщикам.'
    },
    supplier: {
      title: 'Регистрация поставщика',
      lead: 'Создайте аккаунт поставщика, публикуйте предложения и принимайте заявки от заведений.'
    }
  };

  const requestedRole = new URLSearchParams(window.location.search).get('role');
  if (roleCopy[requestedRole]) {
    roleInput.value = requestedRole;
  }

  function updateRoleText() {
    const copy = roleCopy[roleInput.value] || roleCopy.worker;
    authTitle.textContent = copy.title;
    authLead.textContent = copy.lead;
  }

  roleInput.addEventListener('change', updateRoleText);
  updateRoleText();

  registerBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    const role = roleInput.value;

    if (!email || !password) {
      message.textContent = 'Введите email и пароль.';
      return;
    }

    message.textContent = 'Регистрируем...';

    const { error } = await window.supabaseClient.auth.signUp({
      email,
      password,
      options: { data: { role } }
    });

    if (error) {
      message.textContent = 'Ошибка регистрации: ' + error.message;
      return;
    }

    message.textContent = 'Регистрация успешна. Теперь попробуйте войти.';
  });

  loginBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      message.textContent = 'Введите email и пароль.';
      return;
    }

    message.textContent = 'Входим...';

    const { error } = await window.supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      message.textContent = 'Ошибка входа: ' + error.message;
      return;
    }

    window.location.href = 'cabinet.html?v=1003';
  });
</script>
</body>
</html>
