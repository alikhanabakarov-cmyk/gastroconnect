    </section><section class="section form-section" id="request"><div class="form-intro"><h2>Заявка заведения</h2><p>Оставьте заявку на персонал. В первой версии заявки сохраняются в локальную панель управления.</p></div>
<form class="form-card" data-form-type="restaurant"><div class="form-grid">
<label>Название заведения<input name="business_name" required placeholder="Ресторан / кафе / бар"></label><label>Контактное лицо<input name="contact_person" required placeholder="Имя"></label><label>Телефон<input name="phone" required placeholder="+7..."></label><label>Telegram<input name="telegram" placeholder="@username"></label><label>Город<input name="city" placeholder="Москва"></label><label>Адрес<input name="address" placeholder="Улица, метро"></label><label>Кто нужен<select name="needed_role" required><option value="">Выберите вариант</option><option>Официант</option><option>Бармен</option><option>Повар</option><option>Повар горячего цеха</option><option>Повар холодного цеха</option><option>Су-шеф</option><option>Шеф-повар</option><option>Бариста</option><option>Хостес</option><option>Администратор</option><option>Кальянщик</option><option>Посудомойщик</option><option>Курьер</option><option>Раннер</option><option>Уборщик</option><option>Метрдотель</option><option>Сомелье</option><option>Кондитер</option><option>Пекарь</option><option>Заготовщик</option><option>Разнорабочий</option><option>Несколько сотрудников</option><option>Другое</option></select></label><label>Дата<input type="date" name="date"></label><label>Время<input name="time" placeholder="18:00–02:00"></label><label>Оплата<input name="payment" placeholder="4000 ₽ / 350 ₽ час"></label><label>Срочность<select name="urgency"><option>Сегодня</option><option>Завтра</option><option>На этой неделе</option><option>Постоянная вакансия</option></select></label><label class="full">Требования и условия<textarea name="requirements" placeholder="Форма, питание, опыт, задачи на смену..."></textarea></label></div><button class="btn primary" type="submit">Оставить заявку</button><div class="success"></div></form></section></main><footer class="footer" id="contacts">
